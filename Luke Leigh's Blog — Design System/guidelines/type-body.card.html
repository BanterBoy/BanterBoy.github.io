<!-- @dsCard group="Type" viewport="700x250" name="Body & meta in use" subtitle="1.5 line-height body, muted serif-free meta line" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text);
    font-family: var(--font-sans); padding: 24px; line-height: var(--leading-body); }
  h3 { font-size: var(--type-3); margin: 0 0 .25em; line-height: 1.2; }
  .meta { color: var(--text-muted); font-size: var(--type-6); margin-bottom: 1em;
    display: flex; gap: 14px; flex-wrap: wrap; }
  p { font-size: var(--type-5); margin: 0; max-width: 60ch; }
  code { background: var(--code-bg); padding: 1px 4px; border-radius: var(--radius);
    font-family: var(--font-mono); font-size: .85em; }
</style>
</head>
<body>
  <h3>The Blinking Cursor Problem</h3>
  <div class="meta">
    <span><i class="far fa-calendar"></i>&nbsp; 12 Jun 2026</span>
    <span><i class="far fa-clock"></i>&nbsp; 8 minute read</span>
    <span><i class="fas fa-folder"></i>&nbsp; Blog</span>
  </div>
  <p>Most people treat A.I. like a search engine — type three words into the box, hit
  <code>Enter</code>, then wonder why it's rubbish. It isn't the tool. It's the empty box and the
  blinking cursor quietly training you to behave like it's 2004.</p>
</body>
</html>
