<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Subtle shadows — the theme stays mostly flat" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text);
    font-family: var(--font-sans); padding: 28px; }
  .row { display: flex; gap: 30px; }
  .col { display: flex; flex-direction: column; align-items: center; }
  .box { width: 130px; height: 74px; background: var(--surface-raised); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    font-family: var(--font-mono); color: var(--text-muted); }
  .s1 { box-shadow: var(--shadow-sm); }
  .s2 { box-shadow: var(--shadow-pop); }
  .s3 { box-shadow: var(--shadow-img); }
  .cap { font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box s1">card</div><div class="cap">--shadow-sm</div></div>
    <div class="col"><div class="box s2">dropdown</div><div class="cap">--shadow-pop</div></div>
    <div class="col"><div class="box s3">image</div><div class="cap">--shadow-img</div></div>
  </div>
</body>
</html>
