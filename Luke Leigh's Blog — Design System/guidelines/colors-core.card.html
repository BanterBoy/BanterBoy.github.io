<!-- @dsCard group="Colors" viewport="700x180" name="Core palette" subtitle="The dark-skin foundation: slate background, teal accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text);
    font-family: var(--font-sans); padding: 22px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 70px; border-radius: var(--radius); border: 1px solid var(--border); }
  .name { font-size: 13px; font-weight: 700; margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="name">Background</div><div class="hex">#252a34</div></div>
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="name">Primary · teal</div><div class="hex">#00adb5</div></div>
    <div class="sw"><div class="chip" style="background:var(--text)"></div><div class="name">Text</div><div class="hex">#eaeaea</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-raised)"></div><div class="name">Raised surface</div><div class="hex">#2d333f</div></div>
    <div class="sw"><div class="chip" style="background:var(--footer-bg)"></div><div class="name">Footer / masthead</div><div class="hex">#1a1d24</div></div>
  </div>
</body>
</html>
