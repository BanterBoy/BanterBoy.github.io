<!-- @dsCard group="Brand" viewport="700x200" name="Iconography — Font Awesome" subtitle="Solid (fas) & brand (fab) icons, inline before headings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text);
    font-family: var(--font-sans); padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 16px; text-align: center; }
  .ic i { font-size: 22px; color: var(--text); }
  .ic span { display: block; font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 6px; }
  .head { margin-top: 20px; font-size: 17px; font-weight: 700; }
  .head i { color: #fff; margin-right: 8px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="ic"><i class="fas fa-terminal"></i><span>terminal</span></div>
    <div class="ic"><i class="fas fa-laptop-code"></i><span>laptop-code</span></div>
    <div class="ic"><i class="fas fa-robot"></i><span>robot</span></div>
    <div class="ic"><i class="fas fa-folder"></i><span>folder</span></div>
    <div class="ic"><i class="fas fa-bullseye"></i><span>bullseye</span></div>
    <div class="ic"><i class="fab fa-github"></i><span>github</span></div>
    <div class="ic"><i class="fab fa-linkedin"></i><span>linkedin</span></div>
    <div class="ic"><i class="fas fa-satellite-dish"></i><span>satellite</span></div>
  </div>
  <div class="head"><i class="fas fa-i-cursor"></i>The Blinking Cursor Problem</div>
</body>
</html>
