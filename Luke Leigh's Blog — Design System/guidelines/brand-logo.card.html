<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text);
    font-family: var(--font-sans); padding: 0; }
  .masthead { border-bottom: 1px solid var(--border); padding: 18px 24px;
    display: flex; align-items: center; gap: 14px; }
  .masthead img { height: 34px; width: 34px; }
  .title { font-weight: 700; font-size: 19px; line-height: 1.1; }
  .sub { font-size: var(--type-8); color: var(--text); opacity: .85; display: block; margin-top: 2px; }
  .note { padding: 16px 24px; font-size: 12px; color: var(--text-muted); }
  .note b { color: var(--primary); }
</style>
</head>
<body>
  <div class="masthead">
    <img src="../assets/images/PowerShell_5.0_icon88x88.png" alt="PowerShell logo" />
    <div>
      <span class="title">Luke Leigh's Blog</span>
      <span class="sub">Yet another IT Admin Blog</span>
    </div>
  </div>
  <div class="note">The PowerShell glyph is the site mark. Title sits in <b>bold sans</b>; the subtitle uses the tiny <b>type-8 (10px)</b> overline scale.</div>
</body>
</html>
